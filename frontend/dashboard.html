<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <title>MoneyMap - Finance Manager</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <!-- Sidebar / Dashboard Container -->
    <div class="dashboardContainer">
        <a href=""><h1 id="dashLogo">MoneyMap</h1></a>
        <ul>
            <li><a href="#" id="dashboardLink">Dashboard</a></li>
            <li><a href="#" id="transactionsLink">Add Transactions</a></li>
            <li><a href="#" id="amountLink">amounts</a></li>
            <li><a href="#">unreleased</a></li>
        </ul>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection">
        <div id="transactions">
            <!-- Transactions will appear here -->
        </div>
        <button id="deleteBtn" type="button" class="btnStyling">Delete Selected</button>
    </div>

    <!-- Transactions Section -->
    <div id="transactionsSection">
        <form id="transactionsForm" class="transactionsForm">
            <h3 id="transaction-title">Add A Transaction</h3>
            <input type="number" id="amount" placeholder="Enter Amount" required>
            <input type="text" id="type" placeholder="income or expense" required>
            <input type="text" id="category" placeholder="Category e.g., salary" required>
            <input type="date" id="date" required>
            <input type="text" id="description" placeholder="Description" required maxlength="25">
            <button type="submit" class="btnStyling">Add Transaction</button>
            <p id="message" style="color:red;"></p>
        </form>        
    </div>

    <div id="amountSection">
    <div id="amountDisplayed">
        <!-- display the amounts here -->
    </div>
    <p>amount section</p>
    <div id="piechart" style="width: 300px; height: 500px; margin: 20px auto;"></div>

</div>

   <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
<script type="module" src="JS/drawChart.js"></script>
<script type="module" src="JS/transactions.js"></script>
<script type="module" src="JS/formHandler.js"></script>
<script type="module" src="JS/deleteBtn.js"></script>
<script type="module" src="JS/switchViews.js"></script>
<script type="module" src="JS/getAmount.js"></script>

</body>
</html>
